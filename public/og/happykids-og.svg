<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE9C7"/>
      <stop offset="100%" stop-color="#FFF7EE"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g filter="url(#blur)" opacity="0.9">
    <circle cx="160" cy="120" r="180" fill="#FFD1A8"/>
    <circle cx="1040" cy="140" r="220" fill="#CFEEDD"/>
    <circle cx="760" cy="520" r="260" fill="#FFC2B0"/>
  </g>
  <rect x="120" y="140" width="960" height="350" rx="48" fill="rgba(255,255,255,0.78)"/>
  <text x="180" y="300" font-family="'Gaegu','Gowun Dodum',sans-serif" font-size="80" font-weight="700" fill="#3A2E2E">해피키즈</text>
  <text x="180" y="370" font-family="'Gowun Dodum','Gaegu',sans-serif" font-size="36" fill="#5A4A4A">행복한 아이들을 만드는 공간</text>
  <text x="180" y="430" font-family="'Gowun Dodum','Gaegu',sans-serif" font-size="26" fill="#7A6A6A">안양 만안구 공공형 어린이집</text>
</svg>
