<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5de"/>
      <stop offset="100%" stop-color="#fffef7"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g filter="url(#blur)" opacity="0.85">
    <circle cx="220" cy="200" r="260" fill="#ffd7a6"/>
    <circle cx="1280" cy="220" r="300" fill="#ffc2b0"/>
    <circle cx="900" cy="720" r="320" fill="#c8eddc"/>
  </g>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.08"/>
</svg>
